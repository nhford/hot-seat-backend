name: CI

on:
  push:
    branches: [main, master, 2026-refactor]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install serve dependencies
        run: pip install -r requirements-serve.txt

      - name: Syntax check
        run: python -m py_compile src/*.py

      - name: Import predict API
        run: python -c "from src.serve import app; assert app.title"

      - name: Health endpoint shape
        run: |
          python -c "
          from src.serve import health, features
          h = health()
          assert h['ok'] and len(features) > 0
          print(f'ok: {len(features)} features')
          "
